<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Notifications</title><link rel="stylesheet" href="admin.css"><style>.notice.unread{border-left:5px solid #0f9f8f}</style></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Admin Dashboard</div></div></a><nav><a href="index.html">Dashboard</a><a href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="tickets.html">Tickets</a><a href="wallet.html">Wallet</a><a class="active" href="notifications.html">Notifications</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><div><h2>Platform Notifications</h2><span id="count" class="muted"></span></div><button class="soft" onclick="markRead()">Mark all read</button></div></header><main><section class="panel"><div id="list">Loading...</div></section></main></div></div><script src="admin.js"></script><script>
async function loadNotifications(){try{const d=await api("/api/notifications?role=admin");count.textContent=`${d.unread||0} unread`;list.innerHTML=(d.notifications||[]).map(n=>`<div class="item notice ${n.read_at?"":"unread"}"><b>${esc(n.title)}</b><p>${esc(n.body)}</p><p class="muted">${esc(n.type)} | ${new Date(Number(n.created_at)*1000).toLocaleString()}</p>${n.target_url?`<button class="soft" onclick="location.href='${esc(n.target_url)}'">Open</button>`:""}</div>`).join("")||"<p class='muted'>No notifications yet.</p>"}catch(e){list.innerHTML=`<p class='muted'>${e.message}</p>`}}async function markRead(){await api("/api/notifications/read",{method:"POST",body:JSON.stringify({role:"admin"})});loadNotifications()}requireAdmin();loadNotifications();
</script></body></html>
