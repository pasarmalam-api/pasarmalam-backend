<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Chat</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--pink:#e43f8f;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}input{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:900px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),var(--pink),var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel,.msg{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.msg{margin:8px 0}.me{background:#f0fffc;margin-left:30px}.row{display:grid;grid-template-columns:1fr auto;gap:8px}.primary,.soft{border:0;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.primary{background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.muted{color:var(--muted)}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Chat</div></div></div><button class="soft" onclick="location.href='product.html?id=1'">Product</button></div></header><main><section class="panel"><h2>Buyer-Seller Chat</h2><div id="msgs">Loading...</div><div class="row"><input id="text" placeholder="Ask seller about price, warranty, pickup"><button class="primary" onclick="send()">Send</button></div></section></main><script>
const API="https://pasarmalam-backend.onrender.com";async function api(p,o={}){const r=await fetch(API+p,{headers:{"Content-Type":"application/json"},...o});return r.json()}async function load(){const rows=(await api("/api/messages")).messages;msgs.innerHTML=rows.map(m=>`<div class="msg ${m.sender_role==="buyer"?"me":""}"><b>${m.sender_role==="buyer"?"You":m.seller_name}</b><p>${m.body}</p></div>`).join("")||"<p class='muted'>No messages.</p>"}async function send(){await api("/api/messages",{method:"POST",body:JSON.stringify({product_id:1,buyer_name:"Buyer",seller_name:"PasarMalam Seller",sender_role:"buyer",body:text.value})});text.value="";load()}load();
</script></body></html>
