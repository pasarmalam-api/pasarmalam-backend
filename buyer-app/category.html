<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Category</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--pink:#e43f8f;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:1100px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),var(--pink),var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px}.card{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}.photo{aspect-ratio:1/1;background:linear-gradient(135deg,var(--brand),var(--purple));display:grid;place-items:center;color:#fff;font-size:40px;font-weight:900}.body{padding:10px}.price{color:var(--brand);font-weight:900}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.muted{color:var(--muted);font-size:13px}@media(max-width:760px){.grid{grid-template-columns:1fr 1fr}}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div id="title">Category</div></div></div><button class="soft" onclick="location.href='cart.html'">Cart</button></div></header><main><div class="grid" id="list"></div></main><script>
const API="https://pasarmalam-backend.onrender.com";const cat=new URLSearchParams(location.search).get("category")||"All";const money=v=>`RM${Number(v).toFixed(2)}`;function img(p){const src=(p.images&&p.images[0])||p.image_url;return src?`<img src="${src}" style="width:100%;height:100%;object-fit:cover">`:(p.category||"P")[0]}async function load(){title.textContent=cat;const rows=(await (await fetch(API+"/api/products")).json()).products.filter(p=>cat==="All"||p.category===cat);list.innerHTML=rows.map(p=>`<article class="card" onclick="location.href='product.html?id=${p.id}'"><div class="photo">${img(p)}</div><div class="body"><b>${p.name}</b><p class="muted">${p.shop} | ${p.condition}</p><p class="price">${money(p.price)}</p></div></article>`).join("")||"<p>No products.</p>"}load();
</script></body></html>
