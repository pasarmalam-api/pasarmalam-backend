<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>PasarMalam Orders</title>
  <style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--pink:#e43f8f;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:1000px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),var(--pink),var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;margin:16px;padding:14px}.order{border-bottom:1px solid var(--line);padding:12px 0}.tag{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#eafaf2;color:#067647}.muted{color:var(--muted);font-size:13px}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}</style>
</head>
<body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Orders</div></div></div><button class="soft" onclick="location.href='notifications.html'">Notifications</button> <button class="soft" onclick="location.href='index.html'">Home</button></div></header><main><section class="panel"><h2>Order Tracking</h2><div id="orders">Loading...</div></section></main><script>
const API_BASE="https://pasarmalam-backend.onrender.com";function remain(ts){if(!ts)return "-";const s=ts-Math.floor(Date.now()/1000);if(s<=0)return "Expired";return `${Math.floor(s/86400)}d ${Math.floor((s%86400)/3600)}h`}function escrowLabel(s){return {holding:"Holding",released:"Released",dispute_hold:"Dispute hold",refund_approved:"Refund approved",refund_rejected:"Refund rejected",refunded:"Refunded",cancelled:"Cancelled",pending:"Pending"}[s]||s}async function load(){const token=localStorage.getItem("pm_token")||"",headers={};if(token)headers.Authorization=`Bearer ${token}`;const r=await fetch(API_BASE+"/api/orders",{headers});const data=await r.json();orders.innerHTML=data.orders.length?data.orders.map(o=>{const refunded=o.escrow_status==="refunded";return `<div class="order"><b>PM-${o.id}</b> <span class="tag">${refunded?"Refunded":o.order_status}</span><p>${o.payment_status} | Escrow ${escrowLabel(o.escrow_status)}</p>${refunded?'<p class="muted"><b>Refund completed.</b> Seller payout remains blocked for this order.</p>':""}<p class="muted">${o.logistics_method} | Tracking ${o.tracking_no}</p><p class="muted">Return deadline: ${remain(o.return_deadline_at)} | Escrow release: ${remain(o.escrow_release_at)}</p><button class="soft" onclick="location.href='order-detail.html?id=${o.id}'">View Detail</button> <button class="soft" onclick="location.href='returns.html?order_id=${o.id}'">Return / Refund</button></div>`}).join(""):"<p class='muted'>No orders yet.</p>"}load();
</script></body></html>
