<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Reviews</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--line:#e6e9ef;--bg:#f5f7fb;--muted:#687282}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:900px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),#e43f8f,var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel,.item{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.item{margin:8px 0}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.primary,.soft{border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.primary{border:0;background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.muted{color:var(--muted)}@media(max-width:700px){.row{grid-template-columns:1fr}}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Ratings & Reviews</div></div></div><button class="soft" onclick="location.href='orders.html'">Orders</button></div></header><main><section class="panel"><h2>Write Review</h2><div class="row"><input id="product" value="1" placeholder="Product ID"><select id="rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div><input id="title" placeholder="Review title"><textarea id="body" placeholder="Share product quality, delivery and seller service"></textarea><p><button class="primary" onclick="submitReview()">Submit Review</button></p><p id="out" class="muted"></p></section><section class="panel"><h2>Recent Reviews</h2><div id="list">Loading...</div></section></main><script>const API="https://pasarmalam-backend.onrender.com";async function load(){const d=await(await fetch(API+"/api/reviews")).json();list.innerHTML=d.reviews.map(r=>`<div class="item"><b>${"★".repeat(r.rating)} ${r.title}</b><p class="muted">${r.body}</p></div>`).join("")}async function submitReview(){const r=await fetch(API+"/api/reviews",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({product_id:Number(product.value),seller_id:1,rating:Number(rating.value),title:title.value,body:body.value})});const d=await r.json();out.textContent=d.ok?"Review saved.":"Review failed";load()}load()</script></body></html>
