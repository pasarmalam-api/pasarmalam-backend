<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Payment</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--line:#e6e9ef;--bg:#f5f7fb;--muted:#687282}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:900px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:#0f9f8f;display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel,.method{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.method{margin:8px 0}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.muted{color:var(--muted)}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Payment Methods</div></div></div><button class="soft" onclick="location.href='checkout.html'">Checkout</button></div></header><main><section class="panel"><h2>Payment</h2><div class="method"><b>E-Wallet</b><p class="muted">Demo gateway confirmation, ready to connect to real provider later.</p></div><div class="method"><b>Online Banking FPX</b><p class="muted">Bank transfer flow placeholder.</p></div><div class="method"><b>Card</b><p class="muted">Card gateway placeholder. Do not collect real card details in this demo.</p></div><div class="method"><b>Cash Pickup</b><p class="muted">For pickup orders only.</p></div></section></main></body></html>
