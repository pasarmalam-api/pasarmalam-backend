<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>PasarMalam Checkout</title>
  <style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--pink:#e43f8f;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px;font:inherit}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:1000px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),var(--pink),var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;margin:16px;padding:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.primary,.soft{border:0;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.primary{background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.muted{color:var(--muted);font-size:13px}@media(max-width:700px){.row{grid-template-columns:1fr}}</style>
</head>
<body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Checkout</div></div></div><button class="soft" onclick="location.href='cart.html'">Cart</button></div></header><main><section class="panel"><h2>Checkout</h2><textarea id="address">Kuala Lumpur</textarea><div class="row"><select id="shipping"><option>In-Store Pickup</option><option selected>Standard Rider</option><option>Express Rider</option><option>Bulky Item</option><option>Seller Own Fleet</option></select><select id="payment"><option>E-Wallet</option><option>Online Banking FPX</option><option>Card</option><option>Cash Pickup</option></select></div><p class="muted">Payment is demo mode. Escrow status will be holding until order is completed.</p><button class="primary" id="pay">Confirm Payment</button><div id="result"></div></section></main><script>
const API_BASE="https://pasarmalam-backend.onrender.com";async function api(p,o={}){const r=await fetch(API_BASE+p,{headers:{"Content-Type":"application/json"},...o});if(!r.ok)throw new Error(await r.text());return r.json()}pay.onclick=async()=>{const cart=(await api("/api/cart")).cart;const productId=new URLSearchParams(location.search).get("product_id")||cart[0]?.product_id;if(!productId){result.innerHTML="<p>No product in cart.</p>";return}const o=await api("/api/checkout",{method:"POST",body:JSON.stringify({product_id:Number(productId),quantity:1,buyer_name:"Buyer",address:address.value,logistics_method:shipping.value,payment_method:payment.value})});result.innerHTML=`<h3>Payment confirmed</h3><p>Order PM-${o.id}</p><p>Tracking: ${o.tracking_no}</p><p>Escrow: ${o.escrow_status}</p><button class="primary" onclick="location.href='orders.html'">View Orders</button>`};
</script></body></html>
