<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>PasarMalam Checkout</title>
  <style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--pink:#e43f8f;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px;font:inherit}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:1000px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),var(--pink),var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;margin:16px;padding:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.primary,.soft{border:0;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.primary{background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.muted{color:var(--muted);font-size:13px}.error{color:#be123c;font-weight:900}.ok{color:var(--brand);font-weight:900}.total{font-size:22px;font-weight:900;color:var(--brand)}@media(max-width:700px){.row{grid-template-columns:1fr}}</style>
</head>
<body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Checkout</div></div></div><button class="soft" onclick="location.href='cart.html'">Cart</button></div></header><main><section class="panel"><h2>Checkout</h2><h3>Delivery Address</h3><textarea id="address" placeholder="Full delivery address"></textarea><h3>Contact</h3><div class="row"><input id="buyerEmail" type="email" placeholder="Email for receipt"><input id="buyerPhone" placeholder="Phone number"></div><h3>Shipping & Payment</h3><div class="row"><select id="shipping" onchange="renderSummary()"><option>In-Store Pickup</option><option selected>Standard Rider</option><option>Express Rider</option><option>Bulky Item</option><option>Seller Own Fleet</option></select><select id="payment"><option value="">Select payment method</option><option value="Billplz">Billplz FPX</option><option value="ToyyibPay">ToyyibPay FPX / Card / E-Wallet</option><option value="Cash Pickup">Cash Pickup</option></select></div><h3>Voucher</h3><div class="row"><input id="voucher" placeholder="Seller voucher / campaign code"><button class="soft" onclick="applyVoucher()" type="button">Apply Voucher</button></div><p id="voucherStatus" class="muted"></p><div class="panel" style="margin:12px 0 0"><b>Buyer Protection</b><p class="muted">Gateway orders stay pending until the payment provider confirms payment. Paid orders are held in escrow until delivered/completed.</p><b>Order Summary</b><div id="summary" class="muted">Loading cart summary...</div></div><button class="primary" id="pay">Pay Now</button><div id="result"></div></section></main><script>
const API_BASE="https://pasarmalam-backend.onrender.com";let checkoutItem=null,checkoutProduct=null,activeVoucher="",activeDiscount=0;
function currentUser(){try{return JSON.parse(localStorage.getItem("pm_user")||"{}")}catch(e){return {}}}
function token(){return localStorage.getItem("pm_token")||""}
function money(v){return `RM${Number(v||0).toFixed(2)}`}
async function api(p,o={}){const headers={"Content-Type":"application/json",...(o.headers||{})};if(token())headers.Authorization=`Bearer ${token()}`;const r=await fetch(API_BASE+p,{...o,headers});const d=await r.json().catch(async()=>({error:await r.text()}));if(!r.ok||d.error)throw new Error(d.error||"Request failed");return d}
function showError(msg){result.innerHTML=`<p class="error">${msg}</p>`}
function shippingFee(method){const fees={"In-Store Pickup":0,"Standard Rider":4.9,"Express Rider":8.9,"Bulky Item":12.9,"Seller Own Fleet":6.9};const weight=Number(checkoutProduct?.weight_kg||0.5);return Number(fees[method]||4.9)+Math.max(weight-1,0)*1.5}
function subtotal(){return Number(checkoutProduct?.price||0)*(Number(checkoutItem?.quantity)||1)}
function renderSummary(){if(!checkoutItem||!checkoutProduct)return;const ship=shippingFee(shipping.value),total=Math.max(subtotal()+ship-activeDiscount,0),qty=Number(checkoutItem.quantity)||1;summary.innerHTML=`<p><b>${checkoutProduct.name}</b></p><p>${checkoutProduct.shop} | Stock ${checkoutProduct.stock} | Qty ${qty}</p><p>Items: <b>${money(subtotal())}</b></p><p>Shipping: <b>${money(ship)}</b></p><p>Voucher discount: <b>${money(activeDiscount)}</b>${activeVoucher?` (${activeVoucher})`:""}</p><p class="total">Total: ${money(total)}</p>`}
async function applyVoucher(){try{activeVoucher=voucher.value.trim();activeDiscount=0;if(!activeVoucher){voucherStatus.textContent="No voucher applied.";renderSummary();return}const campaigns=(await api("/api/campaigns")).campaigns||[];const c=campaigns.find(x=>String(x.name||"").toLowerCase()===activeVoucher.toLowerCase()&&x.status==="active");if(!c)throw new Error("Voucher not found or inactive.");if(!["voucher","flash_sale","bundle_deal","free_shipping"].includes(c.type))throw new Error("Campaign cannot be used at checkout.");if(c.type==="free_shipping"){activeDiscount=0;voucherStatus.textContent="Free shipping campaign noted. Shipping fee rules remain platform-controlled for now."}else if(String(c.value).trim().endsWith("%")){activeDiscount=Math.min(subtotal()*Number(String(c.value).replace("%",""))/100,subtotal())}else{activeDiscount=Math.min(Number(String(c.value).replace(/[^0-9.]/g,""))||0,subtotal())}voucherStatus.textContent=`Voucher applied: ${activeVoucher} saves ${money(activeDiscount)}.`;renderSummary()}catch(e){activeVoucher="";activeDiscount=0;voucherStatus.textContent=e.message;renderSummary()}}
function requireCheckoutReady(){const u=currentUser();if(!token()||u.role!=="buyer")throw new Error("Please sign in as buyer before checkout.");if(!checkoutItem||!checkoutProduct)throw new Error("No product selected for checkout.");if(!address.value.trim())throw new Error("Delivery address is required.");if(!buyerPhone.value.trim())throw new Error("Phone number is required.");if(!payment.value)throw new Error("Payment method is required.");if(Number(checkoutItem.quantity)<1)throw new Error("Quantity must be at least 1.");if(Number(checkoutItem.quantity)>Number(checkoutProduct.stock||0))throw new Error(`Only ${checkoutProduct.stock} item(s) available.`)}
async function loadSummary(){const u=currentUser();if(!token()||u.role!=="buyer"){summary.innerHTML="<p class='error'>Please sign in as buyer before checkout.</p><button class='primary' onclick=\"location.href='login.html'\">Sign In</button>";pay.disabled=true;return}buyerEmail.value=u.email||"";buyerPhone.value=u.phone||"";address.value=u.address||"";const params=new URLSearchParams(location.search);const productId=params.get("product_id");const urlQty=Math.max(1,Number(params.get("quantity")||1));const urlVariant=params.get("variant")||"";const products=(await api("/api/products")).products;const cart=(await api("/api/cart")).cart;if(productId){checkoutProduct=products.find(p=>String(p.id)===String(productId));checkoutItem={product_id:Number(productId),quantity:urlQty,variant:urlVariant};}else{checkoutItem=cart[0];checkoutProduct=checkoutItem?products.find(p=>String(p.id)===String(checkoutItem.product_id)):null}if(!checkoutItem||!checkoutProduct){summary.innerHTML="<p class='error'>No product in cart. Add an item before checkout.</p>";pay.disabled=true;return}renderSummary()}
pay.onclick=async()=>{try{pay.disabled=true;pay.textContent="Checking order...";requireCheckoutReady();pay.textContent="Creating secure payment...";const payload={product_id:Number(checkoutItem.product_id),quantity:Number(checkoutItem.quantity)||1,variant:checkoutItem.variant||"",buyer_email:buyerEmail.value.trim(),buyer_phone:buyerPhone.value.trim(),address:address.value.trim(),logistics_method:shipping.value,logistics_fee:shippingFee(shipping.value),payment_method:payment.value,voucher_code:activeVoucher};if(payment.value==="Cash Pickup"){const o=await api("/api/checkout",{method:"POST",body:JSON.stringify({...payload,payment_status:"unpaid",order_status:"pending_payment",escrow_status:"pending"})});result.innerHTML=`<h3 class="ok">Cash pickup order created</h3><p>Order PM-${o.id}</p><p>Status: ${o.payment_status}</p><p>Total: ${money(o.total)}${o.discount?` | Voucher saved ${money(o.discount)}`:""}</p><button class="primary" onclick="location.href='orders.html'">View Orders</button>`;return}const path=payment.value==="Billplz"?"/api/payments/billplz/create":"/api/payments/toyyibpay/create";const o=await api(path,{method:"POST",body:JSON.stringify(payload)});if(o.checkout_url){location.href=o.checkout_url;return}showError(o.message||"Payment gateway is not ready.")}catch(err){showError(err.message)}finally{pay.disabled=false;pay.textContent="Pay Now"}};
loadSummary().catch(e=>showError(e.message));
</script></body></html>
