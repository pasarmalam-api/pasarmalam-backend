<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Photo Search</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--pink:#e43f8f;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:1000px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),var(--pink),var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel,.card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.photo{aspect-ratio:1/1;background:linear-gradient(135deg,var(--brand),var(--purple));display:grid;place-items:center;color:#fff;font-size:38px;font-weight:900;overflow:hidden;border-radius:6px}.photo img{width:100%;height:100%;object-fit:cover}.primary,.soft{border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.primary{border:0;background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.muted{color:var(--muted)}input,select{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px}.preview{width:150px;height:150px;border-radius:8px;border:1px solid var(--line);background:#fff center/cover no-repeat;margin-top:10px}@media(max-width:800px){.grid,.row{grid-template-columns:1fr 1fr}}@media(max-width:560px){.grid,.row{grid-template-columns:1fr}}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Search by Photo</div></div></div><button class="soft" onclick="location.href='index.html'">Home</button></div></header><main><section class="panel"><h2>Search Goods by Photo</h2><p class="muted">Upload or take a photo. The app stores the photo in Cloudinary and matches products by category/keyword for now. Real AI visual matching is the next phase.</p><div class="row"><select id="category"><option>All</option><option>Phones</option><option>Chargers</option><option>Electronics</option><option>Car Parts</option><option>Hardware</option><option>Stationery</option><option>Toys</option><option>Shoes</option><option>Clothes</option><option>Meals</option><option>Street Food</option><option>Food</option><option>Drinks</option></select><input id="keyword" placeholder="Optional keyword: phone, toy, meal, hardware"></div><p><button class="soft" onclick="photoInput.click()">Choose from device</button> <button class="soft" onclick="cameraInput.click()">Take a photo</button> <button class="primary" onclick="searchProducts()">Search</button></p><input id="photoInput" type="file" accept="image/*" style="display:none"><input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none"><p id="uploadStatus" class="muted"></p><div id="preview" class="preview" style="display:none"></div></section><section class="panel"><h2>Matches</h2><div class="grid" id="results"></div></section></main><script>
const API="https://pasarmalam-backend.onrender.com",CLOUD_NAME="dn68sok6b",UPLOAD_PRESET="pasarmalam_products";let photoUrl="";photoInput.onchange=()=>handleFile(photoInput.files[0]);cameraInput.onchange=()=>handleFile(cameraInput.files[0]);function resizeImage(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onerror=reject;reader.onload=()=>{const img=new Image();img.onerror=reject;img.onload=()=>{const size=900,canvas=document.createElement("canvas"),ctx=canvas.getContext("2d"),ratio=Math.min(size/img.naturalWidth,size/img.naturalHeight,1),w=Math.round(img.naturalWidth*ratio),h=Math.round(img.naturalHeight*ratio);canvas.width=w;canvas.height=h;ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high";ctx.drawImage(img,0,0,w,h);resolve(canvas.toDataURL("image/jpeg",0.86))};img.src=reader.result};reader.readAsDataURL(file)})}function dataUrlToBlob(dataUrl){const parts=dataUrl.split(","),mime=parts[0].match(/:(.*?);/)[1],bin=atob(parts[1]),arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime})}async function uploadToCloudinary(dataUrl){const fd=new FormData();fd.append("file",dataUrlToBlob(dataUrl),"pasarmalam-photo-search.jpg");fd.append("upload_preset",UPLOAD_PRESET);fd.append("folder","pasarmalam/searches");const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:"POST",body:fd});const d=await r.json();if(!r.ok)throw new Error(d.error?.message||"Image upload failed");return d.secure_url}async function handleFile(file){if(!file)return;uploadStatus.textContent="Uploading search photo...";photoUrl=await uploadToCloudinary(await resizeImage(file));preview.style.display="block";preview.style.backgroundImage=`url('${photoUrl}')`;uploadStatus.textContent="Photo uploaded. Choose category/keyword and search."}const money=v=>`RM${Number(v).toFixed(2)}`;function img(p){const src=(p.images&&p.images[0])||p.image_url;return src?`<img src="${src}">`:(p.category||"P")[0]}async function searchProducts(){const rows=(await(await fetch(API+"/api/products")).json()).products,k=keyword.value.toLowerCase(),cat=category.value;const matches=rows.filter(p=>(cat==="All"||p.category===cat)&&(!k||`${p.name} ${p.category} ${p.description||""}`.toLowerCase().includes(k)));results.innerHTML=matches.map(p=>`<article class="card" onclick="location.href='product.html?id=${p.id}'"><div class="photo">${img(p)}</div><h3>${p.name}</h3><p class="muted">${p.shop} | ${p.condition}</p><b>${money(p.price)}</b></article>`).join("")||"<p class='muted'>No matches. Try a category or keyword.</p>"}searchProducts();
</script></body></html>
