<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Order Detail</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:900px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:#0f9f8f;display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel,.step{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.steps{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.step{margin:0;text-align:center}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.muted{color:var(--muted)}@media(max-width:760px){.steps{grid-template-columns:1fr 1fr}}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Order Detail</div></div></div><button class="soft" onclick="location.href='orders.html'">Orders</button></div></header><main><section class="panel" id="detail">Loading...</section><section class="panel"><h3>Tracking Flow</h3><div class="steps"><div class="step">Placed</div><div class="step">Paid</div><div class="step">Packed</div><div class="step">Shipped</div><div class="step">Delivered</div><div class="step">Completed</div></div></section></main><script>
const API="https://pasarmalam-backend.onrender.com";const id=new URLSearchParams(location.search).get("id");async function load(){const rows=(await (await fetch(API+"/api/orders")).json()).orders;const o=rows.find(x=>String(x.id)===String(id))||rows[0];detail.innerHTML=o?`<h2>Order PM-${o.id}</h2><p>Status: ${o.order_status}</p><p>Payment: ${o.payment_status}</p><p>Escrow: ${o.escrow_status}</p><p>Tracking: ${o.tracking_no}</p><p class="muted">${o.logistics_method} | ${o.address}</p><button class="soft" onclick="location.href='returns.html'">Request Return</button>`:"<p>No order found.</p>"}load();
</script></body></html>
