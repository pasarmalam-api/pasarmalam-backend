<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Order Detail</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb;--ok:#067647;--warn:#b7791f}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:900px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:#0f9f8f;display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel,.step{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.steps{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.step{margin:0;text-align:center}.step.done{border-color:#b8fff5;background:#effdfa;color:var(--ok);font-weight:900}.soft,.primary{border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.primary{background:var(--brand);color:#fff;border:0}.muted{color:var(--muted)}.count{font-size:22px;font-weight:900;color:var(--warn)}@media(max-width:760px){.steps{grid-template-columns:1fr 1fr}}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Order Detail</div></div></div><button class="soft" onclick="location.href='orders.html'">Orders</button></div></header><main><section class="panel" id="detail">Loading...</section><section class="panel"><h3>Tracking Flow</h3><div class="steps" id="steps"></div></section><section class="panel"><h3>Buyer Protection</h3><p>Escrow release countdown</p><div class="count" id="escrowCountdown">-</div><p class="muted" id="returnInfo"></p><button class="primary" id="returnBtn">Request Return / Refund</button></section></main><script>
const API="https://pasarmalam-backend.onrender.com",id=new URLSearchParams(location.search).get("id"),flow=["placed","paid","packed","shipped","delivered","completed"];function fmt(ts){return ts?new Date(ts*1000).toLocaleString():"Not set"}function remaining(ts){if(!ts)return "-";const s=ts-Math.floor(Date.now()/1000);if(s<=0)return "Expired";const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);return `${d}d ${h}h ${m}m`}async function load(){const token=localStorage.getItem("pm_token")||"",headers={};if(token)headers.Authorization=`Bearer ${token}`;const rows=(await (await fetch(API+"/api/orders",{headers})).json()).orders;const o=rows.find(x=>String(x.id)===String(id))||rows[0];if(!o){detail.innerHTML="<p>No order found.</p>";return}const active=flow.indexOf(o.order_status);detail.innerHTML=`<h2>Order PM-${o.id}</h2><p>Status: <b>${o.order_status}</b></p><p>Payment: ${o.payment_status}</p><p>Escrow: ${o.escrow_status}</p><p>Tracking: ${o.tracking_no}</p><p class="muted">${o.logistics_method} | ${o.address}</p><p class="muted">Delivered: ${fmt(o.delivered_at)} | Completed: ${fmt(o.completed_at)}</p>`;steps.innerHTML=flow.map((s,i)=>`<div class="step ${i<=active?"done":""}">${s[0].toUpperCase()+s.slice(1)}</div>`).join("");escrowCountdown.textContent=o.escrow_status==="released"?"Released":remaining(o.escrow_release_at);returnInfo.textContent=`Return/refund deadline: ${fmt(o.return_deadline_at)} (${remaining(o.return_deadline_at)})`;returnBtn.onclick=()=>location.href=`returns.html?order_id=${o.id}`}load();setInterval(()=>load(),60000);
</script></body></html>
