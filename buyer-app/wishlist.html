<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Wishlist</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--pink:#e43f8f;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:900px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),var(--pink),var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.panel,.item{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.item{margin:8px 0}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.muted{color:var(--muted)}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Wishlist</div></div></div><button class="soft" onclick="location.href='index.html'">Home</button></div></header><main><section class="panel"><h2>Wishlist / Favorites</h2><div id="list">Loading...</div></section></main><script>
const API="https://pasarmalam-backend.onrender.com";async function load(){const token=localStorage.getItem("pm_token")||"",headers={};if(token)headers.Authorization=`Bearer ${token}`;const w=(await (await fetch(API+"/api/wishlist",{headers})).json()).wishlist;const p=(await (await fetch(API+"/api/products")).json()).products;list.innerHTML=w.length?w.map(i=>{const prod=p.find(x=>x.id===i.product_id);return `<div class="item"><b>${prod?prod.name:"Product "+i.product_id}</b><p class="muted">Saved for later</p><button class="soft" onclick="location.href='product.html?id=${i.product_id}'">View</button></div>`}).join(""):"<p class='muted'>No wishlist items yet. Tap heart on product cards.</p>"}load();
</script></body></html>
