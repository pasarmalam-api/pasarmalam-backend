<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Password Reset</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--line:#e6e9ef;--bg:#f5f7fb;--muted:#687282}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:760px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:#0f9f8f;display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px;margin:16px}input{width:100%;border:1px solid var(--line);border-radius:6px;padding:11px}.primary,.soft{border-radius:6px;min-height:40px;padding:0 14px;font-weight:900}.primary{border:0;background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.muted{color:var(--muted)}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Reset Password</div></div></div><button class="soft" onclick="location.href='login.html'">Login</button></div></header><main><section class="panel"><h2>Password Reset</h2><input id="email" placeholder="Email address"><p><button class="primary" onclick="reset()">Send Reset Link</button></p><p id="status" class="muted"></p></section></main><script>const API="https://pasarmalam-backend.onrender.com";async function reset(){const r=await fetch(API+"/api/auth/password-reset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email.value})});const d=await r.json();status.textContent=d.ok?"Reset instruction sent to your email.":d.error||"Reset failed"}</script></body></htm
