<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Returns</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:900px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:#0f9f8f;display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel,.item{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.item{margin:8px 0}.primary,.soft{border:0;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.primary{background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.muted{color:var(--muted)}.preview{width:110px;height:110px;border-radius:8px;border:1px solid var(--line);background:#fff center/cover no-repeat;margin-top:10px}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Return / Refund</div></div></div><button class="soft" onclick="location.href='orders.html'">Orders</button></div></header><main><section class="panel"><h2>Request Return, Refund or Change Goods</h2><input id="orderId" placeholder="Order ID"><select id="type"><option>Return/Refund</option><option>Refund Only</option><option>Change Goods</option></select><textarea id="reason" placeholder="Reason, damaged/wrong item, evidence note"></textarea><button class="soft" onclick="evidenceInput.click()">Upload Evidence Photo</button><input id="evidenceInput" type="file" accept="image/*" capture="environment" style="display:none"><p id="uploadStatus" class="muted"></p><div id="preview" class="preview" style="display:none"></div><button class="primary" onclick="submitReturn()">Submit</button></section><section class="panel"><h2>Requests</h2><div id="list">Loading...</div></section></main><script>
const API="https://pasarmalam-backend.onrender.com",CLOUD_NAME="dn68sok6b",UPLOAD_PRESET="pasarmalam_products";let evidenceUrl="";orderId.value=new URLSearchParams(location.search).get("order_id")||"";async function api(p,o={}){const token=localStorage.getItem("pm_token")||"",headers={"Content-Type":"application/json",...(o.headers||{})};if(token)headers.Authorization=`Bearer ${token}`;const r=await fetch(API+p,{...o,headers});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Request failed");return d}function statusLabel(s){return {requested:"Requested",reviewing:"Under review",approved:"Refund approved",rejected:"Rejected",refunded:"Refunded"}[s]||s}function resizeImage(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onerror=reject;reader.onload=()=>{const img=new Image();img.onerror=reject;img.onload=()=>{const size=1200,canvas=document.createElement("canvas"),ctx=canvas.getContext("2d"),ratio=Math.min(size/img.naturalWidth,size/img.naturalHeight,1),w=Math.round(img.naturalWidth*ratio),h=Math.round(img.naturalHeight*ratio);canvas.width=w;canvas.height=h;ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high";ctx.drawImage(img,0,0,w,h);resolve(canvas.toDataURL("image/jpeg",0.86))};img.src=reader.result};reader.readAsDataURL(file)})}function dataUrlToBlob(dataUrl){const parts=dataUrl.split(","),mime=parts[0].match(/:(.*?);/)[1],bin=atob(parts[1]),arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime})}async function uploadToCloudinary(dataUrl){const fd=new FormData();fd.append("file",dataUrlToBlob(dataUrl),"pasarmalam-return.jpg");fd.append("upload_preset",UPLOAD_PRESET);fd.append("folder","pasarmalam/returns");const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:"POST",body:fd});const d=await r.json();if(!r.ok)throw new Error(d.error?.message||"Image upload failed");return d.secure_url}evidenceInput.onchange=async()=>{const file=evidenceInput.files[0];if(!file)return;uploadStatus.textContent="Uploading evidence...";const resized=await resizeImage(file);evidenceUrl=await uploadToCloudinary(resized);preview.style.display="block";preview.style.backgroundImage=`url('${evidenceUrl}')`;uploadStatus.textContent="Evidence uploaded."};async function load(){const rows=(await api("/api/returns")).returns;list.innerHTML=rows.map(r=>`<div class="item"><b>${r.request_type}</b> Order ${r.order_id}<p>${r.reason}</p>${r.evidence_url?`<p><a href="${r.evidence_url}" target="_blank">View evidence photo</a></p>`:""}<span class="muted"><b>${statusLabel(r.status)}</b>${r.dispute_status?` | ${r.dispute_status}`:""}</span>${r.status==="refunded"?'<p class="muted">Refund completed. This case is closed.</p>':""}</div>`).join("")||"<p class='muted'>No return request.</p>"}async function submitReturn(){try{uploadStatus.textContent="Submitting return request...";await api("/api/returns",{method:"POST",body:JSON.stringify({order_id:Number(orderId.value)||1,request_type:type.value,reason:reason.value,evidence_url:evidenceUrl})});reason.value="";evidenceUrl="";preview.style.display="none";uploadStatus.textContent="Return request submitted. Escrow is now on dispute hold.";load()}catch(e){uploadStatus.textContent=e.message}}load();
</script></body></html>
