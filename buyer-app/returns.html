<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Returns</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:900px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:#0f9f8f;display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel,.item{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.item{margin:8px 0}.primary,.soft{border:0;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.primary{background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.muted{color:var(--muted)}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Return / Refund</div></div></div><button class="soft" onclick="location.href='orders.html'">Orders</button></div></header><main><section class="panel"><h2>Request Return, Refund or Change Goods</h2><input id="orderId" placeholder="Order ID"><select id="type"><option>Return/Refund</option><option>Refund Only</option><option>Change Goods</option></select><textarea id="reason" placeholder="Reason, damaged/wrong item, evidence note"></textarea><button class="primary" onclick="submitReturn()">Submit</button></section><section class="panel"><h2>Requests</h2><div id="list">Loading...</div></section></main><script>
const API="https://pasarmalam-backend.onrender.com";async function api(p,o={}){const r=await fetch(API+p,{headers:{"Content-Type":"application/json"},...o});return r.json()}async function load(){const rows=(await api("/api/returns")).returns;list.innerHTML=rows.map(r=>`<div class="item"><b>${r.request_type}</b> Order ${r.order_id}<p>${r.reason}</p><span class="muted">${r.status}</span></div>`).join("")||"<p class='muted'>No return request.</p>"}async function submitReturn(){await api("/api/returns",{method:"POST",body:JSON.stringify({order_id:Number(orderId.value)||1,buyer_name:"Buyer",request_type:type.value,reason:reason.value})});reason.value="";load()}load();
</script></body></html>
