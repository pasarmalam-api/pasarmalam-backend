<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Profile</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--pink:#e43f8f;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}input,textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:900px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),var(--pink),var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.primary,.soft{border:0;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.primary{background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.muted{color:var(--muted)}@media(max-width:700px){.row{grid-template-columns:1fr}}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Profile</div></div></div><button class="soft" onclick="location.href='orders.html'">Orders</button></div></header><main><section class="panel"><h2>Buyer Login</h2><div class="row"><input id="email" value="buyer@pasarmalam.my"><input id="password" type="password" value="demo123"></div><button class="primary" onclick="login()">Login</button><button class="soft" onclick="reset()">Reset Password</button><p id="status" class="muted">Not logged in.</p></section><section class="panel"><h2>Buyer Profile</h2><input value="Aina Buyer"><input value="0123456789"><textarea>Kuala Lumpur</textarea><button class="primary">Save Profile</button></section></main><script>
const API="https://pasarmalam-backend.onrender.com";async function api(p,o={}){const r=await fetch(API+p,{headers:{"Content-Type":"application/json"},...o});return r.json()}async function login(){const r=await api("/api/auth/login",{method:"POST",body:JSON.stringify({email:email.value,password:password.value})});status.textContent=r.user?`${r.user.name} | ${r.user.phone} | ${r.user.address}`:"Login failed"}async function reset(){await api("/api/auth/password-reset",{method:"POST",body:JSON.stringify({email:email.value})});status.textContent="Password reset link sent in demo mode."}
</script></body></html>
