<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>PasarMalam Cart</title>
  <style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--pink:#e43f8f;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:1000px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),var(--pink),var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;margin:16px;padding:14px}.line{display:grid;grid-template-columns:1fr auto;gap:10px;border-bottom:1px solid var(--line);padding:12px 0}.muted{color:var(--muted);font-size:13px}.primary,.soft,.danger,.step{border-radius:6px;min-height:38px;padding:0 14px;font-weight:900;cursor:pointer}.primary{border:0;background:var(--brand);color:#fff}.soft,.step{background:#fff;color:var(--brand);border:1px solid #b8fff5}.danger{background:#fff0f3;color:#be123c;border:1px solid #fecdd3}.price{color:var(--brand);font-weight:900}.qty{display:flex;gap:6px;align-items:center;justify-content:flex-end}.qty b{min-width:28px;text-align:center}.error{color:#be123c;font-weight:900}@media(max-width:700px){.line{grid-template-columns:1fr}.qty{justify-content:flex-start}}</style>
</head>
<body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Cart</div></div></div><button class="soft" onclick="location.href='index.html'">Home</button></div></header><main><section class="panel"><h2>Your Cart</h2><div class="line"><div><b>Platform Voucher</b><div class="muted">RM5 off above RM50, applied when eligible.</div></div><button class="soft">Use Voucher</button></div><div class="line"><div><b>PM Coins</b><div class="muted">Earn coins after order is completed.</div></div><span class="price">+25 coins</span></div><div id="cartList">Loading...</div><h3 id="total"></h3><p id="status" class="muted"></p><button class="primary" onclick="goCheckout()">Checkout</button></section></main><script>
const API_BASE="https://pasarmalam-backend.onrender.com";let cart=[];const money=v=>`RM${Number(v||0).toFixed(2)}`;function token(){return localStorage.getItem("pm_token")||""}async function api(path,options={}){const headers={"Content-Type":"application/json",...(options.headers||{})};if(token())headers.Authorization=`Bearer ${token()}`;const r=await fetch(API_BASE+path,{...options,headers});const d=await r.json().catch(async()=>({error:await r.text()}));if(!r.ok||d.error)throw new Error(d.error||"Request failed");return d}function draw(){let sum=0;cartList.innerHTML=cart.length?cart.map(i=>{sum+=Number(i.price)*Number(i.quantity);return `<div class="line"><div><b>${i.name}</b><div class="muted">${i.shop} | ${i.category||""} | Stock ${i.stock} ${i.variant||""}</div><div class="muted">Unit ${money(i.price)} | Subtotal <b>${money(Number(i.price)*Number(i.quantity))}</b></div></div><div><div class="qty"><button class="step" onclick="changeQty(${i.id},${i.quantity-1})">-</button><b>${i.quantity}</b><button class="step" onclick="changeQty(${i.id},${i.quantity+1})">+</button></div><button class="danger" onclick="removeItem(${i.id})">Remove</button></div></div>`}).join(""):"<p class='muted'>Cart is empty.</p>";total.textContent="Total: "+money(sum)}async function load(){try{const data=await api("/api/cart");cart=data.cart||[];draw()}catch(e){status.textContent=e.message;cartList.innerHTML="<p class='error'>Please sign in to view cart.</p>"}}async function changeQty(id,quantity){try{const item=cart.find(i=>i.id===id);if(!item)return;if(quantity<1){status.textContent="Quantity cannot be below 1.";return}if(quantity>Number(item.stock||0)){status.textContent=`Only ${item.stock} item(s) available.`;return}await api("/api/cart",{method:"PUT",body:JSON.stringify({id,product_id:item.product_id,quantity,variant:item.variant||""})});status.textContent="Cart updated.";await load()}catch(e){status.textContent=e.message}}async function removeItem(id){try{await api("/api/cart",{method:"DELETE",body:JSON.stringify({id})});status.textContent="Item removed.";await load()}catch(e){status.textContent=e.message}}function goCheckout(){if(!cart.length){status.textContent="Cart is empty.";return}location.href="checkout.html"}load();
</script></body></html>
