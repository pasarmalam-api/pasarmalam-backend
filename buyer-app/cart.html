<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>PasarMalam Cart</title>
  <style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--pink:#e43f8f;--line:#e6e9ef;--muted:#687282;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:1000px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),var(--pink),var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;margin:16px;padding:14px}.line{display:grid;grid-template-columns:1fr auto;gap:10px;border-bottom:1px solid var(--line);padding:12px 0}.muted{color:var(--muted);font-size:13px}.primary,.soft{border:0;border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.primary{background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.price{color:var(--brand);font-weight:900}</style>
</head>
<body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Cart</div></div></div><button class="soft" onclick="location.href='index.html'">Home</button></div></header><main><section class="panel"><h2>Your Cart</h2><div class="line"><div><b>Platform Voucher</b><div class="muted">RM5 off above RM50, selected automatically in demo.</div></div><button class="soft">Use Voucher</button></div><div class="line"><div><b>PM Coins</b><div class="muted">Earn coins after order is completed.</div></div><span class="price">+25 coins</span></div><div id="cartList">Loading...</div><h3 id="total"></h3><button class="primary" onclick="location.href='checkout.html'">Checkout</button></section></main><script>
const API_BASE="https://pasarmalam-backend.onrender.com";const money=v=>`RM${Number(v).toFixed(2)}`;async function load(){const r=await fetch(API_BASE+"/api/cart");const data=await r.json();let sum=0;cartList.innerHTML=data.cart.length?data.cart.map(i=>{sum+=i.price*i.quantity;return `<div class="line"><div><b>${i.name}</b><div class="muted">${i.shop} | Qty ${i.quantity} ${i.variant||""}</div></div><div class="price">${money(i.price*i.quantity)}</div></div>`}).join(""):"<p class='muted'>Cart is empty.</p>";total.textContent="Total: "+money(sum)}load();
</script></body></html>
