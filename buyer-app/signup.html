<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Signup</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--line:#e6e9ef;--bg:#f5f7fb;--muted:#687282}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:820px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:conic-gradient(from 160deg,var(--brand),var(--purple),#e43f8f,var(--brand));display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px;margin:16px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:11px}.primary,.soft{border-radius:6px;min-height:40px;padding:0 14px;font-weight:900}.primary{border:0;background:var(--brand);color:#fff}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.muted{color:var(--muted)}@media(max-width:700px){.row{grid-template-columns:1fr}}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Daftar Akaun</div></div></div><button class="soft" onclick="location.href='login.html'">Login</button></div></header><main><section class="panel"><h2>Signup Pembeli</h2><div class="row"><input id="name" placeholder="Full name"><input id="phone" placeholder="Phone number"></div><div class="row"><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"></div><textarea id="address" placeholder="Delivery address"></textarea><p><button class="primary" onclick="signup()">Create Account</button></p><p id="status" class="muted"></p></section></main><script>const API="https://pasarmalam-backend.onrender.com";async function signup(){const r=await fetch(API+"/api/auth/signup",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:name.value,email:email.value,password:password.value,phone:phone.value,address:address.value,role:"buyer"})});const d=await r.json();status.textContent=d.ok?"Account created. You can login now.":d.error||"Signup failed"}</script></body></html>
