<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PasarMalam Notifications</title><style>:root{--brand:#0f9f8f;--purple:#6d5dfc;--line:#e6e9ef;--bg:#f5f7fb;--muted:#687282}body{margin:0;font-family:Arial,sans-serif;background:var(--bg)}header{background:linear-gradient(180deg,var(--brand),var(--purple));color:#fff}.bar,main{max-width:900px;margin:auto}.bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.brand{display:flex;gap:10px;align-items:center;cursor:pointer}.logo{width:50px;height:50px;border-radius:13px;background:#0f9f8f;display:grid;place-items:center;font-weight:900;box-shadow:inset 0 0 0 3px #ffffffcc}.panel,.item{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin:16px}.item{margin:8px 0}.item.unread{border-left:5px solid var(--brand)}.soft,.primary{border-radius:6px;min-height:38px;padding:0 14px;font-weight:900}.soft{background:#fff;color:var(--brand);border:1px solid #b8fff5}.primary{background:var(--brand);color:#fff;border:0}.muted{color:var(--muted)}</style></head><body><header><div class="bar"><div class="brand" onclick="location.href='index.html'"><div class="logo">PM</div><div><h2>PasarMalam</h2><div>Notifications</div></div></div><button class="soft" onclick="location.href='index.html'">Home</button></div></header><main><section class="panel"><h2>Notifications <span id="count" class="muted"></span></h2><button class="primary" onclick="markRead()">Mark all read</button><div id="list">Loading...</div></section></main><script>
const API="https://pasarmalam-backend.onrender.com";function token(){return localStorage.getItem("pm_token")||""}async function api(path,options={}){const headers={"Content-Type":"application/json",...(options.headers||{})};if(token())headers.Authorization=`Bearer ${token()}`;const r=await fetch(API+path,{...options,headers});const d=await r.json().catch(()=>({}));if(!r.ok||d.error)throw new Error(d.error||"Request failed");return d}function esc(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}function time(v){return v?new Date(Number(v)*1000).toLocaleString():""}async function load(){try{const d=await api("/api/notifications?role=buyer&user_id=1");count.textContent=`${d.unread||0} unread`;list.innerHTML=(d.notifications||[]).map(n=>`<div class="item ${n.read_at?"":"unread"}"><b>${esc(n.title)}</b><p>${esc(n.body)}</p><p class="muted">${esc(n.type)} | ${time(n.created_at)}</p>${n.target_url?`<button class="soft" onclick="location.href='${esc(n.target_url)}'">Open</button>`:""}</div>`).join("")||"<p class='muted'>No notifications yet.</p>"}catch(e){list.innerHTML=`<p class='muted'>${e.message}</p>`}}async function markRead(){await api("/api/notifications/read",{method:"POST",body:JSON.stringify({role:"buyer",user_id:1})});load()}load();
</script></body></html>
