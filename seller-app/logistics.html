<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Logistics</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a href="products.html">Products</a><a href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a class="active" href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Logistics / AWB</h2></div></header><main><section class="two"><div class="panel"><h3>Rates</h3><div id="rates"></div></div><div class="panel"><h3>Generate AWB</h3><input id="orderId" placeholder="Order ID"><button class="primary" onclick="awb()">Generate</button><p id="out" class="muted"></p></div></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";async function api(p,o={}){const r=await fetch(API+p,{headers:{"Content-Type":"application/json"},...o});return r.json()}async function load(){rates.innerHTML=(await api("/api/logistics/rates")).rates.map(r=>`<div class="rate"><span>${r.method}<br><small>${r.eta}</small></span><b>RM${Number(r.fee).toFixed(2)}</b></div>`).join("")}async function awb(){const r=await api("/api/logistics/awb",{method:"POST",body:JSON.stringify({order_id:Number(orderId.value)||1})});out.textContent=r.print_text}load();
</script></body></html>
