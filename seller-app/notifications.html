<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Notifications</title><link rel="stylesheet" href="seller.css"><style>.notice.unread{border-left:5px solid #0f9f8f}</style></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="wallet.html">Wallet</a><a class="active" href="notifications.html">Notifications</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><div><h2>Notifications</h2><span id="count" class="muted"></span></div><button class="primary" onclick="markRead()">Mark all read</button></div></header><main><section class="panel"><div id="list">Loading...</div></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";function token(){return localStorage.getItem("pm_token")||""}async function api(path,options={}){const headers={"Content-Type":"application/json",...(options.headers||{})};if(token())headers.Authorization=`Bearer ${token()}`;const r=await fetch(API+path,{...options,headers});const d=await r.json().catch(()=>({}));if(!r.ok||d.error)throw new Error(d.error||"Request failed");return d}function esc(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}function time(v){return v?new Date(Number(v)*1000).toLocaleString():""}async function load(){try{const d=await api("/api/notifications?role=seller");count.textContent=`${d.unread||0} unread`;list.innerHTML=(d.notifications||[]).map(n=>`<div class="order notice ${n.read_at?"":"unread"}"><b>${esc(n.title)}</b><p>${esc(n.body)}</p><p class="muted">${esc(n.type)} | ${time(n.created_at)}</p>${n.target_url?`<button class="soft" onclick="location.href='${esc(n.target_url)}'">Open</button>`:""}</div>`).join("")||"<p class='muted'>No notifications yet.</p>"}catch(e){list.innerHTML=`<p class='muted'>${e.message}</p>`}}async function markRead(){await api("/api/notifications/read",{method:"POST",body:JSON.stringify({role:"seller"})});load()}load();
</script></body></html>
