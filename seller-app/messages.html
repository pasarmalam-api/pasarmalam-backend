<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Messages</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a href="products.html">Products</a><a href="orders.html">Orders</a><a href="returns.html">Returns</a><a class="active" href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Buyer Messages</h2></div></header><main><section class="panel"><div id="msgs"></div><div class="row"><input id="reply" placeholder="Reply to buyer"><button class="primary" onclick="send()">Send</button></div></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";function token(){return localStorage.getItem("pm_token")||""}async function api(p,o={}){const headers={"Content-Type":"application/json",...(o.headers||{})};if(token())headers.Authorization=`Bearer ${token()}`;const r=await fetch(API+p,{...o,headers});const d=await r.json().catch(()=>({}));if(!r.ok||d.error)throw new Error(d.error||"Request failed");return d}function esc(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}async function load(){try{msgs.innerHTML=(await api("/api/messages")).messages.map(m=>`<div class="msg"><b>${esc(m.sender_role==="buyer"?m.buyer_name:m.seller_name)}</b><p>${esc(m.body)}</p></div>`).join("")||"<p class='muted'>No messages.</p>"}catch(e){msgs.innerHTML=`<p class='muted'>${e.message}</p>`}}async function send(){try{if(!reply.value.trim())throw new Error("Reply cannot be empty.");await api("/api/messages",{method:"POST",body:JSON.stringify({product_id:1,buyer_name:"Buyer",seller_name:"PasarMalam Seller",sender_role:"seller",body:reply.value.trim()})});reply.value="";await load()}catch(e){msgs.innerHTML=`<p class='muted'>${e.message}</p>`+msgs.innerHTML}}load();
</script></body></html>
