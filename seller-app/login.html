<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Login</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a class="active" href="login.html">Login</a><a href="store-profile.html">Store Profile</a><a href="products.html">Products</a><a href="orders.html">Orders</a><a href="performance.html">Performance</a></nav></aside><div><header><div class="top"><h2>Seller Login</h2></div></header><main><section class="panel"><div class="row"><input id="email" value="seller@pasarmalam.my"><input id="password" type="password" value="demo123"></div><button class="primary" onclick="login()">Login</button><p id="status" class="muted"></p></section></main></div></div><script>const API="https://pasarmalam-backend.onrender.com";async function login(){const r=await fetch(API+"/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email.value,password:password.value})});const d=await r.json();if(d.token){localStorage.setItem("pm_token",d.token);localStorage.setItem("pm_user",JSON.stringify(d.user));status.textContent="Seller logged in."}else status.textContent=d.error||"Login failed"}</script></body></html>
