<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Products</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a class="active" href="products.html">Products</a><a href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><div><h2>Products</h2><span class="muted">Manage stock, variants, images and pricing.</span></div><button class="primary" onclick="location.href='index.html'">Add Product</button></div></header><main><section class="panel"><div class="panel-head"><h3>Live Listings</h3><input id="q" placeholder="Search products" style="max-width:320px"></div><table><thead><tr><th>Product</th><th>Price</th><th>Stock</th><th>Condition</th><th>Shipping</th><th>Action</th></tr></thead><tbody id="rows"></tbody></table></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";const money=v=>`RM${Number(v).toFixed(2)}`;let products=[];function row(p){const img=(p.images&&p.images[0])||p.image_url;return `<tr><td>${img?`<img class="thumb" src="${img}">`:""}<b>${p.name}</b><div class="muted">${p.category} | ${(p.variants||[]).join(", ")}</div></td><td>${money(p.price)}</td><td>${p.stock}</td><td><span class="tag">${p.condition}</span></td><td>${p.shipping_type}</td><td><button class="soft">Edit</button></td></tr>`}function draw(){const s=q.value.toLowerCase();rows.innerHTML=products.filter(p=>`${p.name} ${p.category}`.toLowerCase().includes(s)).map(row).join("")}async function load(){products=(await (await fetch(API+"/api/products")).json()).products;draw()}q.oninput=draw;load();
</script></body></html>
