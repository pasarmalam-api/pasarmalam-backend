<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Campaigns</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a href="products.html">Products</a><a href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a class="active" href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Campaign Tools</h2></div></header><main><section class="two"><div class="panel"><h3>Create Campaign</h3><input id="name" placeholder="Campaign name"><div class="row"><select id="type"><option>voucher</option><option>bundle_deal</option><option>flash_sale</option><option>free_shipping</option></select><input id="value" placeholder="Value"></div><button class="primary" onclick="create()">Create</button></div><div class="panel"><h3>Active Campaigns</h3><div id="campaigns"></div></div></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";async function api(p,o={}){const r=await fetch(API+p,{headers:{"Content-Type":"application/json"},...o});return r.json()}async function load(){campaigns.innerHTML=(await api("/api/campaigns")).campaigns.map(c=>`<div class="item"><b>${c.name}</b><p>${c.type} | ${c.value} | ${c.status}</p></div>`).join("")}async function create(){await api("/api/campaigns",{method:"POST",body:JSON.stringify({name:name.value,type:type.value,value:value.value})});load()}load();
</script></body></html>
