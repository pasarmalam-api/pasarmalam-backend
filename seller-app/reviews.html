<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Reviews</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a href="products.html">Products</a><a href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a class="active" href="reviews.html">Reviews</a><a href="notifications.html">Notifications</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Reviews</h2><button class="primary" onclick="load()">Refresh</button></div></header><main><section class="panel"><div id="reviews"></div></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";function token(){return localStorage.getItem("pm_token")||""}function esc(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}async function api(path,options={}){const headers={"Content-Type":"application/json",...(options.headers||{})};if(token())headers.Authorization=`Bearer ${token()}`;const r=await fetch(API+path,{...options,headers});const d=await r.json().catch(()=>({}));if(!r.ok||d.error)throw new Error(d.error||"Request failed");return d}async function load(){try{const rows=(await api("/api/reviews")).reviews;reviews.innerHTML=rows.map(r=>`<div class="msg"><div class="stars">${"*".repeat(Number(r.rating)||0)}</div><b>${esc(r.title)}</b><p>${esc(r.body)}</p><p class="muted">Buyer: ${esc(r.buyer_name)}</p>${r.seller_reply?`<p><b>Seller reply:</b> ${esc(r.seller_reply)}</p>`:`<textarea id="reply${r.id}" placeholder="Reply to this review"></textarea><button class="soft" onclick="replyReview(${r.id})">Reply</button>`}<p class="muted" id="msg${r.id}"></p></div>`).join("")||"<p class='muted'>No reviews yet.</p>"}catch(e){reviews.innerHTML=`<p class='muted'>${e.message}</p>`}}async function replyReview(id){const msg=document.getElementById("msg"+id);try{msg.textContent="Saving reply...";await api("/api/reviews/reply",{method:"POST",body:JSON.stringify({review_id:id,seller_reply:document.getElementById("reply"+id).value})});msg.textContent="Reply saved.";await load()}catch(e){msg.textContent=e.message}}load();
</script></body></html>
