<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Returns</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a href="products.html">Products</a><a href="orders.html">Orders</a><a class="active" href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="notifications.html">Notifications</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Returns / Refund / Change Goods</h2><button class="primary" onclick="load()">Refresh</button></div></header><main><section class="panel"><div id="returns"></div></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";function token(){return localStorage.getItem("pm_token")||""}async function api(path,options={}){const headers={"Content-Type":"application/json",...(options.headers||{})};if(token())headers.Authorization=`Bearer ${token()}`;const r=await fetch(API+path,{...options,headers});const d=await r.json().catch(()=>({}));if(!r.ok||d.error)throw new Error(d.error||"Request failed");return d}function esc(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}async function load(){try{const rows=(await api("/api/returns")).returns;returns.innerHTML=rows.map(r=>`<div class="order"><b>${esc(r.request_type)}</b> Order ${r.order_id}<p>${esc(r.reason)}</p><span class="tag">${esc(r.status)}</span><p class="muted">Dispute: ${esc(r.dispute_status)}</p><textarea id="resp${r.id}" placeholder="Seller response">${esc(r.seller_response)}</textarea><button class="soft" onclick="respond(${r.id})">Send Response</button><p class="muted" id="msg${r.id}"></p></div>`).join("")||"<p class='muted'>No return request.</p>"}catch(e){returns.innerHTML=`<p class='muted'>${e.message}</p>`}}async function respond(id){const msg=document.getElementById("msg"+id);try{msg.textContent="Sending...";await api("/api/returns/respond",{method:"POST",body:JSON.stringify({return_id:id,seller_response:document.getElementById("resp"+id).value})});msg.textContent="Response sent.";await load()}catch(e){msg.textContent=e.message}}load();
</script></body></html>
