<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Order Detail</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a href="products.html">Products</a><a class="active" href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Order Detail</h2><button class="soft" onclick="location.href='orders.html'">Orders</button></div></header><main><section class="panel" id="detail">Loading...</section><section class="panel"><h3>Seller Actions</h3><div class="row"><select id="status"><option value="to_pack">To Pack</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select><input id="tracking" placeholder="Tracking / rider note"><button class="primary" onclick="update()">Save Update</button></div><button class="soft" onclick="awb()">Generate AWB</button><p id="out" class="muted"></p></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";const id=new URLSearchParams(location.search).get("id");let order=null;async function api(p,o={}){const token=localStorage.getItem("pm_token")||"",headers={"Content-Type":"application/json",...(o.headers||{})};if(token)headers.Authorization=`Bearer ${token}`;const r=await fetch(API+p,{...o,headers});const d=await r.json().catch(()=>({}));if(!r.ok||d.error)throw new Error(d.error||"Request failed");return d}function cleanStatus(s){if(["placed","paid","packed"].includes(s))return"to_pack";return s||"to_pack"}async function load(){try{const rows=(await api("/api/orders")).orders;order=rows.find(x=>String(x.id)===String(id))||rows[0];if(!order){detail.innerHTML="<p>No order found.</p>";return}status.value=cleanStatus(order.order_status);tracking.value=order.tracking_no||"";detail.innerHTML=`<h3>PM-${order.id}</h3><p>Status: ${order.order_status}</p><p>Payment: ${order.payment_status}</p><p>Escrow: ${order.escrow_status}</p><p>Tracking: ${order.tracking_no||"-"}</p><p>${order.logistics_method||""} | ${order.address||""}</p>`}catch(e){detail.innerHTML=`<p class='muted'>${e.message}</p>`}}async function update(){try{if(!order)throw new Error("No order selected.");await api("/api/orders/status",{method:"POST",body:JSON.stringify({order_id:order.id,order_status:status.value,tracking_no:tracking.value})});out.textContent="Order updated.";await load()}catch(e){out.textContent=e.message}}async function awb(){try{const r=await api("/api/logistics/awb",{method:"POST",body:JSON.stringify({order_id:order?order.id:1})});out.textContent=r.print_text}catch(e){out.textContent=e.message}}load();</script></body></html>
