<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Order Detail</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a href="products.html">Products</a><a class="active" href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Order Detail</h2><button class="soft" onclick="location.href='orders.html'">Orders</button></div></header><main><section class="panel" id="detail">Loading...</section><section class="panel"><h3>Seller Actions</h3><div class="row"><select id="status"><option>placed</option><option>paid</option><option>packed</option><option>shipped</option><option>delivered</option><option>completed</option><option>cancelled</option></select><button class="primary" onclick="update()">Update Status</button></div><button class="soft" onclick="awb()">Generate AWB</button><p id="out" class="muted"></p></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";const id=new URLSearchParams(location.search).get("id");let order=null;async function api(p,o={}){const token=localStorage.getItem("pm_token")||"",headers={"Content-Type":"application/json",...(o.headers||{})};if(token)headers.Authorization=`Bearer ${token}`;const r=await fetch(API+p,{...o,headers});return r.json()}async function load(){const rows=(await api("/api/orders")).orders;order=rows.find(x=>String(x.id)===String(id))||rows[0];detail.innerHTML=order?`<h3>PM-${order.id}</h3><p>Status: ${order.order_status}</p><p>Payment: ${order.payment_status}</p><p>Escrow: ${order.escrow_status}</p><p>Tracking: ${order.tracking_no}</p><p>${order.logistics_method} | ${order.address}</p>`:"<p>No order found.</p>"}async function update(){if(!order)return;await api("/api/orders/status",{method:"POST",body:JSON.stringify({order_id:order.id,order_status:status.value})});out.textContent="Order updated";load()}async function awb(){const r=await api("/api/logistics/awb",{method:"POST",body:JSON.stringify({order_id:order?order.id:1})});out.textContent=r.print_text}load();</script></body></html>
