<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Orders</title><link rel="stylesheet" href="seller.css"><style>.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{border:1px solid #cdeee9;background:#fff;color:#0f9f8f;border-radius:6px;padding:9px 12px;font-weight:900}.tabs button.active{background:#0f9f8f;color:#fff}.countdown{font-weight:900;color:#b7791f}</style></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a href="products.html">Products</a><a class="active" href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Orders</h2><button class="primary" onclick="load()">Refresh</button></div></header><main><section class="panel"><div class="tabs" id="tabs"></div></section><section class="panel"><h3 id="tabTitle">Orders</h3><div id="orders"></div></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com",tabsDef={unpaid:"Unpaid",to_pack:"To Pack",shipped:"Shipped",delivered:"Delivered",completed:"Completed",cancelled:"Cancelled"};let current="to_pack",all=[];async function api(p,o={}){const token=localStorage.getItem("pm_token")||"",headers={"Content-Type":"application/json",...(o.headers||{})};if(token)headers.Authorization=`Bearer ${token}`;const r=await fetch(API+p,{...o,headers});const text=await r.text();let data={};try{data=text?JSON.parse(text):{}}catch(e){data={error:text}}if(!r.ok||data.error)throw new Error(data.error||data.message||"Request failed");return data}function bucket(o){if(o.payment_status!=="paid")return"unpaid";if(o.order_status==="cancelled")return"cancelled";if(o.order_status==="completed")return"completed";if(o.order_status==="delivered")return"delivered";if(o.order_status==="shipped")return"shipped";return"to_pack"}function remain(ts){if(!ts)return"-";const s=ts-Math.floor(Date.now()/1000);if(s<=0)return"Expired";return`${Math.floor(s/86400)}d ${Math.floor((s%86400)/3600)}h`}function nextAction(o){const b=bucket(o);if(b==="to_pack")return `<button class="primary" onclick="quick(${o.id},'shipped')">Mark Shipped</button>`;if(b==="shipped")return `<button class="primary" onclick="quick(${o.id},'delivered')">Mark Delivered</button>`;if(b==="delivered")return `<button class="primary" onclick="quick(${o.id},'completed')">Complete</button>`;return ""}function html(o){return `<div class="order"><b>PM-${o.id}</b> <span class="tag">${o.order_status}</span><p>${o.payment_status} | Escrow ${o.escrow_status}</p><p class="muted">${o.logistics_method} | Tracking: ${o.tracking_no||"-"}</p><p class="muted">Return deadline ${remain(o.return_deadline_at)} | Escrow release ${remain(o.escrow_release_at)}</p><div class="row"><select id="s${o.id}"><option value="to_pack">To Pack</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select><input id="t${o.id}" placeholder="Tracking / rider note" value="${(o.tracking_no||"").replace(/"/g,"&quot;")}"><button class="soft" onclick="update(${o.id})">Save Update</button><button class="soft" onclick="location.href='order-detail.html?id=${o.id}'">Detail</button></div><p>${nextAction(o)}</p><p class="muted" id="m${o.id}"></p></div>`}function render(){tabs.innerHTML=Object.entries(tabsDef).map(([k,v])=>`<button class="${current===k?"active":""}" onclick="current='${k}';render()">${v} (${all.filter(o=>bucket(o)===k).length})</button>`).join("");tabTitle.textContent=tabsDef[current];const rows=all.filter(o=>bucket(o)===current);orders.innerHTML=rows.map(html).join("")||"<p class='muted'>No orders in this tab.</p>";rows.forEach(o=>{const el=document.getElementById("s"+o.id);if(el)el.value=bucket(o)==="to_pack"?"to_pack":o.order_status})}async function quick(id,status){document.getElementById("s"+id).value=status;await update(id)}async function update(id){const msg=document.getElementById("m"+id);try{msg.textContent="Saving...";await api("/api/orders/status",{method:"POST",body:JSON.stringify({order_id:id,order_status:document.getElementById("s"+id).value,tracking_no:document.getElementById("t"+id).value})});msg.textContent="Saved. Refreshing...";await load()}catch(err){msg.textContent=err.message}}async function load(){try{all=(await api("/api/orders")).orders||[];render()}catch(err){orders.innerHTML=`<p class='muted'>${err.message}</p>`}}load();
</script></body></html>
