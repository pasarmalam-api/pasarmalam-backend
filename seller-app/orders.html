<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Orders</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a href="products.html">Products</a><a class="active" href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Orders</h2><button class="primary" onclick="load()">Refresh</button></div></header><main><section class="panel"><h3>Order Status Flow</h3><div id="orders"></div></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";async function api(p,o={}){const r=await fetch(API+p,{headers:{"Content-Type":"application/json"},...o});return r.json()}function html(o){return `<div class="order"><b>PM-${o.id}</b> <span class="tag">${o.order_status}</span><p>${o.payment_status} | Escrow ${o.escrow_status}</p><p class="muted">${o.logistics_method} | ${o.tracking_no}</p><div class="row"><select id="s${o.id}"><option>placed</option><option>paid</option><option>packed</option><option>shipped</option><option>delivered</option><option>completed</option><option>cancelled</option></select><button class="soft" onclick="update(${o.id})">Update</button><button class="soft" onclick="location.href='order-detail.html?id=${o.id}'">Detail</button></div></div>`}async function update(id){await api("/api/orders/status",{method:"POST",body:JSON.stringify({order_id:id,order_status:document.getElementById("s"+id).value})});load()}async function load(){orders.innerHTML=(await api("/api/orders")).orders.map(html).join("")||"<p class='muted'>No orders.</p>"}load();
</script></body></html>
