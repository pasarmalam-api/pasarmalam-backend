<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Edit Product</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a class="active" href="products.html">Products</a><a href="orders.html">Orders</a><a href="campaigns.html">Campaigns</a><a href="performance.html">Performance</a></nav></aside><div><header><div class="top"><h2>Edit Product</h2><button class="soft" onclick="location.href='products.html'">Product List</button></div></header><main><section class="panel"><h3>Listing Editor</h3><div class="row"><input id="name" placeholder="Product name"><input id="price" placeholder="Price RM"></div><div class="row"><input id="stock" placeholder="Stock"><select id="category"><option>Phones</option><option>Chargers</option><option>Electronics</option><option>Car Parts</option><option>Hardware</option><option>Stationery</option><option>Toys</option><option>Shoes</option><option>Clothes</option><option>Meals</option><option>Street Food</option><option>Food</option><option>Drinks</option></select></div><div class="row"><select id="condition"><option>New</option><option>Used</option></select><select id="priceMode"><option>Fixed</option><option>Negotiable</option></select></div><input id="variants" placeholder="Variants"><textarea id="desc" placeholder="Description"></textarea><div class="row"><button class="primary" onclick="save()">Save Changes</button><button class="danger" onclick="removeProduct()">Delete Product</button></div><p id="out" class="muted"></p></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";const id=new URLSearchParams(location.search).get("id")||1;async function api(p,o={}){const token=localStorage.getItem("pm_token")||"",headers={"Content-Type":"application/json",...(o.headers||{})};if(token)headers.Authorization=`Bearer ${token}`;const r=await fetch(API+p,{...o,headers});const d=await r.json().catch(()=>({}));if(!r.ok||d.error)throw new Error(d.error||"Request failed");return d}async function load(){try{const p=(await api("/api/products")).products.find(x=>String(x.id)===String(id));if(!p){out.textContent="Product not found.";return}name.value=p.name;price.value=p.price;stock.value=p.stock;category.value=p.category;condition.value=p.condition;priceMode.value=p.price_mode;variants.value=(p.variants||[]).join(", ");desc.value=p.description||""}catch(e){out.textContent=e.message}}async function save(){try{await api("/api/products/"+id,{method:"PUT",body:JSON.stringify({name:name.value,category:category.value,price:Number(price.value),stock:Number(stock.value),condition:condition.value,price_mode:priceMode.value,variants:variants.value.split(",").map(x=>x.trim()).filter(Boolean),description:desc.value})});out.textContent="Product updated."}catch(e){out.textContent=e.message}}async function removeProduct(){try{if(!confirm("Delete this product?"))return;await api("/api/products/"+id,{method:"DELETE"});out.textContent="Product deleted.";setTimeout(()=>location.href="products.html",600)}catch(e){out.textContent=e.message}}load();
</script></body></html>
