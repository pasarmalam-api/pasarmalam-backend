<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Edit Product</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a class="active" href="products.html">Products</a><a href="orders.html">Orders</a><a href="campaigns.html">Campaigns</a><a href="performance.html">Performance</a></nav></aside><div><header><div class="top"><h2>Edit Product</h2><button class="soft" onclick="location.href='products.html'">Product List</button></div></header><main><section class="panel"><h3>Listing Editor</h3><div class="row"><input id="name" placeholder="Product name"><input id="price" placeholder="Price RM"></div><div class="row"><input id="stock" placeholder="Stock"><select id="condition"><option>New</option><option>Used</option></select></div><div class="row"><input id="variants" placeholder="Variants"><select id="priceMode"><option>Fixed</option><option>Negotiable</option></select></div><textarea id="desc" placeholder="Description"></textarea><button class="primary" onclick="save()">Save Changes</button><p id="out" class="muted"></p></section></main></div></div><script>const API="https://pasarmalam-backend.onrender.com";const id=new URLSearchParams(location.search).get("id")||1;async function api(p,o){return(await fetch(API+p,{headers:{"Content-Type":"application/json"},...o})).json()}async function load(){const p=(await api("/api/products")).products.find(x=>String(x.id)===String(id));if(!p)return;name.value=p.name;price.value=p.price;stock.value=p.stock;condition.value=p.condition;priceMode.value=p.price_mode;variants.value=(p.variants||[]).join(", ");desc.value=p.description||""}async function save(){const d=await api("/api/products/"+id,{method:"PUT",body:JSON.stringify({name:name.value,price:Number(price.value),stock:Number(stock.value),condition:condition.value,price_mode:priceMode.value,variants:variants.value.split(",").map(x=>x.trim()).filter(Boolean),description:desc.value})});out.textContent=d.ok?"Product updated.":"Save failed"}load()</script></body></html>
