<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Add Product</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a class="active" href="products.html">Products</a><a href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Add Product</h2><button class="soft" onclick="location.href='products.html'">Product List</button></div></header><main><section class="panel"><h3>Product Information</h3><div class="row"><input id="name" placeholder="Product name"><input id="price" placeholder="Price RM"></div><div class="row"><input id="stock" placeholder="Stock"><select id="category"><option>Phones</option><option>Chargers</option><option>Electronics</option><option>Car Parts</option><option>Hardware</option><option>Stationery</option><option>Toys</option><option>Shoes</option><option>Clothes</option><option>Meals</option><option>Street Food</option><option>Food</option><option>Drinks</option></select></div><div class="row"><select id="condition"><option>New</option><option>Used</option></select><select id="priceMode"><option>Fixed</option><option>Negotiable</option></select></div><div class="row"><input id="variants" placeholder="Variants: size,color,model"><input id="weight" placeholder="Weight KG" value="0.5"></div><div class="row"><select id="shipping"><option>Standard Rider</option><option>In-Store Pickup</option><option>Express Rider</option><option>Bulky Item</option><option>Seller Own Fleet</option></select><input id="warranty" placeholder="Warranty / return rule"></div><div class="row"><button class="soft" type="button" onclick="productImage.click()">Choose from device</button><button class="soft" type="button" onclick="cameraImage.click()">Take a photo</button></div><input id="productImage" type="file" accept="image/*" multiple style="display:none"><input id="cameraImage" type="file" accept="image/*" capture="environment" style="display:none"><p id="uploadStatus" class="muted"></p><div class="preview-grid" id="previewGrid"></div><textarea id="desc" placeholder="Description"></textarea><button class="primary" onclick="save()">Publish Product</button><p id="out" class="muted"></p></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com",CLOUD_NAME="dn68sok6b",UPLOAD_PRESET="pasarmalam_products";let images=[];productImage.onchange=()=>handleFiles([...productImage.files]);cameraImage.onchange=()=>handleFiles([...cameraImage.files]);function authHeaders(){const token=localStorage.getItem("pm_token")||"",headers={"Content-Type":"application/json"};if(token)headers.Authorization=`Bearer ${token}`;return headers}function resizeMarketplaceImage(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onerror=reject;reader.onload=()=>{const img=new Image();img.onerror=reject;img.onload=()=>{const size=1200,canvas=document.createElement("canvas"),ctx=canvas.getContext("2d"),sourceSize=Math.min(img.naturalWidth,img.naturalHeight),sx=(img.naturalWidth-sourceSize)/2,sy=(img.naturalHeight-sourceSize)/2;canvas.width=size;canvas.height=size;ctx.fillStyle="#fff";ctx.fillRect(0,0,size,size);ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high";ctx.drawImage(img,sx,sy,sourceSize,sourceSize,0,0,size,size);resolve(canvas.toDataURL("image/jpeg",0.86))};img.src=reader.result};reader.readAsDataURL(file)})}function dataUrlToBlob(dataUrl){const parts=dataUrl.split(","),mime=parts[0].match(/:(.*?);/)[1],bin=atob(parts[1]),arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime})}async function uploadToCloudinary(dataUrl){const fd=new FormData();fd.append("file",dataUrlToBlob(dataUrl),"pasarmalam-product.jpg");fd.append("upload_preset",UPLOAD_PRESET);fd.append("folder","pasarmalam/products");const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:"POST",body:fd});const d=await r.json();if(!r.ok)throw new Error(d.error?.message||"Image upload failed");return d.secure_url}async function handleFiles(files){for(const file of files.slice(0,6)){if(file.type.startsWith("image/")){uploadStatus.textContent="Uploading image...";const resized=await resizeMarketplaceImage(file);images.push(await uploadToCloudinary(resized))}}uploadStatus.textContent="";previewGrid.innerHTML=images.map(img=>`<div class="preview" style="background-image:url('${img}')"></div>`).join("")}async function save(){const payload={name:name.value,shop:"PasarMalam Seller",category:category.value,price:Number(price.value)||0,stock:Number(stock.value)||0,condition:condition.value,price_mode:priceMode.value,variants:variants.value.split(",").map(x=>x.trim()).filter(Boolean),weight_kg:Number(weight.value)||0.5,shipping_type:shipping.value,warranty:warranty.value,description:desc.value,images};const r=await fetch(API+"/api/products",{method:"POST",headers:authHeaders(),body:JSON.stringify(payload)});const data=await r.json();out.textContent=data.id?`Product published: #${data.id}`:data.error||"Failed to publish"}</script></body></html>
