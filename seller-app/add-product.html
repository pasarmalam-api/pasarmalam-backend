<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Add Product</title><link rel="stylesheet" href="seller.css"></head><body><div class="app"><aside><a class="brand" href="index.html"><div class="logo">PM</div><div><h1>PasarMalam</h1><div class="label">Seller Centre</div></div></a><nav><a href="index.html">Dashboard</a><a class="active" href="products.html">Products</a><a href="orders.html">Orders</a><a href="returns.html">Returns</a><a href="messages.html">Messages</a><a href="logistics.html">Logistics</a><a href="wallet.html">Wallet</a><a href="campaigns.html">Campaigns</a><a href="reviews.html">Reviews</a><a href="settings.html">Settings</a></nav></aside><div><header><div class="top"><h2>Add Product</h2><button class="soft" onclick="location.href='products.html'">Product List</button></div></header><main><section class="panel"><h3>Product Information</h3><div class="row"><input id="name" placeholder="Product name"><input id="price" placeholder="Price RM"></div><div class="row"><input id="stock" placeholder="Stock"><select id="category"><option>Phones</option><option>Chargers</option><option>Electronics</option><option>Car Parts</option><option>Shoes</option><option>Clothes</option><option>Food</option><option>Drinks</option></select></div><div class="row"><select id="condition"><option>New</option><option>Used</option></select><select id="priceMode"><option>Fixed</option><option>Negotiable</option></select></div><div class="row"><input id="variants" placeholder="Variants: size,color,model"><input id="weight" placeholder="Weight KG" value="0.5"></div><div class="row"><select id="shipping"><option>Standard Rider</option><option>In-Store Pickup</option><option>Express Rider</option><option>Bulky Item</option><option>Seller Own Fleet</option></select><input id="warranty" placeholder="Warranty / return rule"></div><textarea id="desc" placeholder="Description"></textarea><button class="primary" onclick="save()">Publish Product</button><p id="out" class="muted"></p></section></main></div></div><script>
const API="https://pasarmalam-backend.onrender.com";async function save(){const payload={name:name.value,shop:"PasarMalam Seller",category:category.value,price:Number(price.value)||0,stock:Number(stock.value)||0,condition:condition.value,price_mode:priceMode.value,variants:variants.value.split(",").map(x=>x.trim()).filter(Boolean),weight_kg:Number(weight.value)||0.5,shipping_type:shipping.value,warranty:warranty.value,description:desc.value,images:[]};const r=await fetch(API+"/api/products",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});const data=await r.json();out.textContent=data.id?`Product published: #${data.id}`:"Failed to publish"}</script></body></html>
